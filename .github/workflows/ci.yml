name: ExpenseFlow AI CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    name: Backend CI
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: expenseflow
          MYSQL_ROOT_PASSWORD: root_password_here
          MYSQL_USER: expenseflow_user
          MYSQL_PASSWORD: user_password_here
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest

    - name: Run Integration Tests
      run: |
        python backend/tests/test_production.py
      env:
        DATABASE_URL: mysql+pymysql://expenseflow_user:user_password_here@127.0.0.1:3306/expenseflow
        JWT_SECRET: testing_secret_key_123

  frontend-build:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Verify Production Build
      working-directory: ./frontend
      run: npm run build

  docker-verify:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
