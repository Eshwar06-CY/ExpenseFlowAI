version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: expenseflow_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expenseflow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_here}
      MYSQL_USER: ${MYSQL_USER:-expenseflow_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-user_password_here}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expenseflow_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=${PROJECT_NAME:-ExpenseFlow AI}
      - API_V1_STR=${API_V1_STR:-/api/v1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-expenseflow_user}:${MYSQL_PASSWORD:-user_password_here}@db:3306/${MYSQL_DATABASE:-expenseflow}
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_change_me_in_production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expenseflow_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
